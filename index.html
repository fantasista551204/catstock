<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ネコ用品 在庫管理システム</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (ブラウザ内でJSXをコンパイル) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- HTML5 Qrcode -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fade-in-down { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }
    @keyframes zoom-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
    .animate-fade-in-down { animation: fade-in-down 0.3s ease-out forwards; }
    .animate-zoom-in { animation: zoom-in 0.2s ease-out forwards; }
    
    /* 読み込み中オーバーレイ */
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #ea580c; /* orange-600 */
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-orange-50 font-sans text-gray-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    
    // アイコンをCDN(lucide-react)依存から、インラインSVGコンポーネントへ置き換え
    const Icon = ({ path, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {path}
      </svg>
    );
    const Camera = (p) => <Icon {...p} path={<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>} />;
    const Plus = (p) => <Icon {...p} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;
    const Edit2 = (p) => <Icon {...p} path={<><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></>} />;
    const Trash2 = (p) => <Icon {...p} path={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />;
    const Package = (p) => <Icon {...p} path={<><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></>} />;
    const History = (p) => <Icon {...p} path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/><polyline points="12 7 12 12 15 15"/></>} />;
    const Search = (p) => <Icon {...p} path={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} />;
    const X = (p) => <Icon {...p} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
    const Check = (p) => <Icon {...p} path={<polyline points="20 6 9 17 4 12"/>} />;
    const ArrowDownCircle = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><polyline points="8 12 12 16 16 12"/><line x1="12" y1="8" x2="12" y2="16"/></>} />;
    const ArrowUpCircle = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><polyline points="16 12 12 8 8 12"/><line x1="12" y1="16" x2="12" y2="8"/></>} />;
    const AlertTriangle = (p) => <Icon {...p} path={<><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />;
    const Calendar = (p) => <Icon {...p} path={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>} />;
    const BarChart3 = (p) => <Icon {...p} path={<><path d="M3 3v18h18"/><rect x="7" y="10" width="4" height="7" rx="1"/><rect x="14" y="5" width="4" height="12" rx="1"/></>} />;
    const ImageIcon = (p) => <Icon {...p} path={<><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>} />;
    const Loader2 = (p) => <Icon {...p} className={`animate-spin ${p.className||""}`} path={<><path d="M21 12a9 9 0 1 1-6.219-8.56"/></>} />;

    // ★★★ ここにデプロイしたGASのウェブアプリURLを貼り付けてください ★★★
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzClAeFMHgDcHRsthJ275G7wfChOIiHhG7FrxXK3nvGAHDVbhOoq-SEcSwZolA1CAr3/exec";

    const CATEGORIES = ['ドライフード', 'ウェットフード', 'おやつ', 'トイレ用品', 'ケア用品', 'おもちゃ', 'その他'];

    const generateId = () => Math.random().toString(36).substr(2, 9);
    const getTodayString = () => new Date().toISOString().split('T')[0];

    // --- バーコードスキャナー ---
    const BarcodeScanner = ({ onScan, onClose }) => {
      useEffect(() => {
        let isMounted = true;
        let html5QrcodeScanner;
        
        const initScanner = () => {
          if (!isMounted) return;
          if (window.Html5QrcodeScanner) {
            try {
              html5QrcodeScanner = new window.Html5QrcodeScanner(
                "reader", { fps: 10, qrbox: { width: 250, height: 150 }, aspectRatio: 1.0 }, false
              );
              html5QrcodeScanner.render(
                (decodedText) => onScan(decodedText),
                (error) => { /* 継続 */ }
              );
            } catch (e) {
              console.error(e);
            }
          }
        };
        setTimeout(initScanner, 100);

        return () => {
          isMounted = false;
          if (html5QrcodeScanner) html5QrcodeScanner.clear().catch(e => console.error(e));
        };
      }, [onScan]);

      return (
        <div className="fixed inset-0 bg-black/80 z-50 flex flex-col items-center justify-center p-4">
          <div className="w-full max-w-md bg-white rounded-xl overflow-hidden shadow-2xl">
            <div className="p-4 bg-gray-100 border-b flex justify-between items-center">
              <h3 className="font-bold text-gray-700">JANコードをスキャン</h3>
              <button onClick={onClose} className="p-2 bg-gray-200 rounded-full hover:bg-gray-300"><X size={20} /></button>
            </div>
            <div className="p-4 bg-black flex justify-center min-h-[300px]">
              <div id="reader" className="w-full max-w-sm rounded-lg overflow-hidden border-2 border-dashed border-gray-500"></div>
            </div>
            <div className="p-4 bg-gray-50 text-sm text-gray-500 text-center">
              枠内にバーコードを写してください
            </div>
          </div>
        </div>
      );
    };

    // --- メインアプリ ---
    function App() {
      const [activeTab, setActiveTab] = useState('products');
      const [isLoading, setIsLoading] = useState(true); // 初期ロード状態
      
      const [products, setProducts] = useState([]);
      const [histories, setHistories] = useState([]);
      
      const [selectedMonth, setSelectedMonth] = useState('');
      const [deleteConfirm, setDeleteConfirm] = useState({ isOpen: false, type: '', id: '' });
      const [toastMessage, setToastMessage] = useState('');

      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(''), 3000);
      };

      // 1. 初期ロード時: GASからスプレッドシートのデータを取得
      useEffect(() => {
        if (GAS_URL === "ここにGASのウェブアプリURLを貼り付けます") {
          setIsLoading(false);
          showToast("【注意】GASのURLが設定されていません");
          return;
        }

        fetch(GAS_URL)
          .then(res => res.json())
          .then(data => {
            setProducts(data.products || []);
            setHistories(data.histories || []);
          })
          .catch(err => {
            console.error("データ取得エラー", err);
            showToast("データの取得に失敗しました");
          })
          .finally(() => {
            setIsLoading(false);
          });
      }, []);

      // GASへPOSTリクエストを送信する関数 (非同期でバックグラウンド実行)
      const postToGAS = (action, data) => {
        if (GAS_URL === "ここにGASのウェブアプリURLを貼り付けます") return;
        
        fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' }, // CORS回避
          body: JSON.stringify({ action, data })
        }).catch(err => console.error("GAS送信エラー:", err));
      };

      const monthOptions = useMemo(() => {
        const options = [];
        const now = new Date();
        for (let i = 0; i < 12; i++) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          const value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
          const label = `${d.getFullYear()}年${d.getMonth() + 1}月`;
          options.push({ value, label });
        }
        return options;
      }, []);

      const getProductStats = (productId) => {
        let currentStock = 0;
        let selectedMonthConsumption = 0;
        histories.filter(h => h.productId === productId).forEach(h => {
          if (h.type === 'in') currentStock += Number(h.quantity);
          if (h.type === 'out') currentStock -= Number(h.quantity);
          if (h.type === 'out' && selectedMonth && String(h.date).startsWith(selectedMonth)) {
            selectedMonthConsumption += Number(h.quantity);
          }
        });
        return { currentStock, selectedMonthConsumption };
      };

      // 削除処理 (UI先行更新 + GASへ送信)
      const handleDelete = () => {
        if (deleteConfirm.type === 'product') {
          setProducts(products.filter(p => p.id !== deleteConfirm.id));
          // 関連履歴もUI上から消す
          setHistories(histories.filter(h => h.productId !== deleteConfirm.id));
          postToGAS('deleteProduct', { id: deleteConfirm.id });
          showToast('商品を削除しました');
        } else if (deleteConfirm.type === 'history') {
          setHistories(histories.filter(h => h.id !== deleteConfirm.id));
          postToGAS('deleteHistory', { id: deleteConfirm.id });
          showToast('履歴を削除しました');
        }
        setDeleteConfirm({ isOpen: false, type: '', id: '' });
      };

      // --- 商品一覧関連 ---
      const [productModal, setProductModal] = useState({ isOpen: false, isEditing: false, data: null });

      const openProductModal = (product = null) => {
        setProductModal({
          isOpen: true, isEditing: !!product,
          data: product || { name: '', category: CATEGORIES[0], janCode: '', imageUrl: '' }
        });
      };

      const saveProduct = (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const newProduct = {
          id: productModal.isEditing ? productModal.data.id : generateId(),
          name: formData.get('name'),
          category: formData.get('category'),
          janCode: formData.get('janCode'),
          imageUrl: formData.get('imageUrl') || 'https://placehold.co/150x150/e2e8f0/64748b?text=No+Image'
        };

        if (productModal.isEditing) {
          setProducts(products.map(p => p.id === newProduct.id ? newProduct : p));
          postToGAS('editProduct', newProduct); // 編集（削除して追加）
          showToast('商品を更新しました');
        } else {
          setProducts([...products, newProduct]);
          postToGAS('addProduct', newProduct); // 追加
          showToast('商品を登録しました');
        }
        setProductModal({ isOpen: false, isEditing: false, data: null });
      };

      // --- 履歴関連 ---
      const [historyModal, setHistoryModal] = useState({ isOpen: false, isEditing: false, data: null });
      const [historyForm, setHistoryForm] = useState({ janCode: '', date: getTodayString(), quantity: 1, type: 'in', productId: '', productName: '', productCategory: '' });
      const [isScannerOpen, setIsScannerOpen] = useState(false);

      const openHistoryModal = (history = null) => {
        if (history) {
          const product = products.find(p => p.id === history.productId);
          setHistoryForm({
            ...history,
            janCode: product?.janCode || '', productName: product?.name || '不明', productCategory: product?.category || ''
          });
          setHistoryModal({ isOpen: true, isEditing: true, data: history });
        } else {
          setHistoryForm({ janCode: '', date: getTodayString(), quantity: 1, type: 'in', productId: '', productName: '', productCategory: '' });
          setHistoryModal({ isOpen: true, isEditing: false, data: null });
        }
      };

      const handleJanCodeChange = (jan) => {
        const product = products.find(p => p.janCode === String(jan));
        setHistoryForm(prev => ({
          ...prev, janCode: jan,
          productId: product ? product.id : '', productName: product ? product.name : '', productCategory: product ? product.category : ''
        }));
      };

      const handleScan = (decodedText) => {
        setIsScannerOpen(false);
        handleJanCodeChange(decodedText);
        showToast('バーコードを読み取りました');
      };

      const saveHistory = (typeOverride = null) => {
        if (!historyForm.productId) {
          showToast('登録済みのJANコードを入力するか、商品登録をしてください');
          return;
        }

        const type = typeOverride || historyForm.type;
        const newHistory = {
          id: historyModal.isEditing ? historyModal.data.id : generateId(),
          productId: historyForm.productId,
          type: type,
          quantity: Number(historyForm.quantity),
          date: historyForm.date,
          timestamp: historyModal.isEditing ? historyModal.data.timestamp : Date.now()
        };

        if (historyModal.isEditing) {
          setHistories(histories.map(h => h.id === newHistory.id ? newHistory : h));
          postToGAS('editHistory', newHistory); // 編集（削除して追加）
          showToast('履歴を更新しました');
        } else {
          setHistories([newHistory, ...histories]);
          postToGAS('addHistory', newHistory); // 追加
          showToast(type === 'in' ? '入庫を記録しました' : '出庫を記録しました');
        }
        setHistoryModal({ isOpen: false, isEditing: false, data: null });
      };

      if (isLoading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center">
            <div className="loader mb-4"></div>
            <p className="text-gray-500 font-medium animate-pulse">スプレッドシートから読み込み中...</p>
          </div>
        );
      }

      // JSXレンダー部 (デザインは前回と同一)
      return (
        <div className="min-h-screen">
          {toastMessage && (
            <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-2 animate-fade-in-down">
              <Check size={18} className="text-green-400" />
              <span>{toastMessage}</span>
            </div>
          )}

          <header className="bg-white shadow-sm border-b border-orange-100 sticky top-0 z-30">
            <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center gap-2 text-orange-600">
                <Package size={28} />
                <h1 className="text-xl font-bold tracking-tight">ネコ用品 在庫管理</h1>
              </div>
              <div className="flex bg-gray-100 rounded-lg p-1">
                <button onClick={() => setActiveTab('products')} className={`px-4 py-2 text-sm font-medium rounded-md flex items-center gap-2 ${activeTab === 'products' ? 'bg-white shadow text-orange-600' : 'text-gray-500'}`}>
                  <Package size={16} /> <span className="hidden sm:inline">用品一覧</span>
                </button>
                <button onClick={() => setActiveTab('histories')} className={`px-4 py-2 text-sm font-medium rounded-md flex items-center gap-2 ${activeTab === 'histories' ? 'bg-white shadow text-orange-600' : 'text-gray-500'}`}>
                  <History size={16} /> <span className="hidden sm:inline">入出庫履歴</span>
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-4 py-8">
            {activeTab === 'products' && (
              <div className="space-y-6 animate-fade-in">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-orange-100">
                  <div className="flex items-center gap-3">
                    <div className="p-2 bg-orange-100 text-orange-600 rounded-lg"><BarChart3 size={20} /></div>
                    <div>
                      <label className="text-xs text-gray-500 font-medium block">月別消費数の確認</label>
                      <select value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="border-none bg-gray-50 text-sm rounded-md py-1.5 px-3 pr-8 focus:ring-2 focus:ring-orange-500 outline-none">
                        <option value="">月を選択しない</option>
                        {monthOptions.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                      </select>
                    </div>
                  </div>
                  <button onClick={() => openProductModal()} className="w-full sm:w-auto bg-orange-600 hover:bg-orange-700 text-white px-5 py-2.5 rounded-lg flex items-center justify-center gap-2 font-medium shadow-sm">
                    <Plus size={18} /> 用品を追加
                  </button>
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-orange-100 overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse min-w-[600px]">
                      <thead>
                        <tr className="bg-orange-50 border-b border-orange-100 text-orange-800 text-sm">
                          <th className="p-4 w-16">画像</th><th className="p-4">商品情報</th><th className="p-4 text-center w-24">現在庫</th>
                          {selectedMonth && <th className="p-4 text-center w-28 bg-orange-100/50">{selectedMonth.split('-')[1]}月<br/><span className="text-xs">消費数</span></th>}
                          <th className="p-4 text-right w-24">操作</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        {products.length === 0 ? <tr><td colSpan="5" className="p-8 text-center text-gray-500">データがありません</td></tr> : 
                          products.map(product => {
                            const { currentStock, selectedMonthConsumption } = getProductStats(product.id);
                            return (
                              <tr key={product.id} className="hover:bg-orange-50/50 group">
                                <td className="p-4"><img src={product.imageUrl} className="w-12 h-12 rounded-lg object-cover border" /></td>
                                <td className="p-4">
                                  <div className="font-bold mb-1">{product.name}</div>
                                  <div className="flex items-center gap-3 text-xs"><span className="bg-gray-100 px-2 py-0.5 rounded-full">{product.category}</span><span className="text-gray-400">JAN: {product.janCode}</span></div>
                                </td>
                                <td className="p-4 text-center">
                                  <span className={`inline-flex items-center justify-center min-w-[3rem] px-2 py-1 rounded-lg text-lg font-bold ${currentStock <= 0 ? 'bg-red-100 text-red-700' : currentStock <= 2 ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700'}`}>
                                    {currentStock}
                                  </span>
                                </td>
                                {selectedMonth && <td className="p-4 text-center bg-orange-50/30"><span className="text-lg font-bold text-orange-600">{selectedMonthConsumption}</span></td>}
                                <td className="p-4 text-right">
                                  <div className="flex justify-end gap-2 opacity-100 sm:opacity-0 group-hover:opacity-100">
                                    <button onClick={() => openProductModal(product)} className="p-2 text-blue-600 bg-blue-50 rounded-lg"><Edit2 size={16} /></button>
                                    <button onClick={() => setDeleteConfirm({ isOpen: true, type: 'product', id: product.id })} className="p-2 text-red-600 bg-red-50 rounded-lg"><Trash2 size={16} /></button>
                                  </div>
                                </td>
                              </tr>
                            );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'histories' && (
              <div className="space-y-6 animate-fade-in">
                <div className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-orange-100">
                  <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2"><History className="text-orange-500" size={24} /> 入出庫履歴</h2>
                  <button onClick={() => openHistoryModal()} className="bg-orange-600 text-white px-5 py-2.5 rounded-lg flex items-center gap-2 font-medium"><Plus size={18} /> レコード追加</button>
                </div>
                <div className="bg-white rounded-xl shadow-sm border border-orange-100 overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse min-w-[600px]">
                      <thead>
                        <tr className="bg-orange-50 border-b border-orange-100 text-orange-800 text-sm">
                          <th className="p-4 w-28">日付</th><th className="p-4 w-24 text-center">区分</th><th className="p-4">商品</th><th className="p-4 text-center w-24">数量</th><th className="p-4 text-right w-24">操作</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        {histories.length === 0 ? <tr><td colSpan="5" className="p-8 text-center text-gray-500">履歴がありません</td></tr> : 
                          histories.sort((a, b) => b.timestamp - a.timestamp).map(history => {
                            const product = products.find(p => p.id === history.productId);
                            return (
                              <tr key={history.id} className="hover:bg-orange-50/50 group">
                                <td className="p-4 text-sm">{history.date}</td>
                                <td className="p-4 text-center">
                                  {history.type === 'in' ? <span className="inline-flex gap-1 bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs font-bold"><ArrowUpCircle size={14} /> 入庫</span> : 
                                                           <span className="inline-flex gap-1 bg-orange-100 text-orange-700 px-2 py-1 rounded-full text-xs font-bold"><ArrowDownCircle size={14} /> 出庫</span>}
                                </td>
                                <td className="p-4">
                                  {product ? <div><div className="font-bold">{product.name}</div><div className="text-xs text-gray-400">JAN: {product.janCode}</div></div> : <span className="text-red-500 text-sm flex gap-1"><AlertTriangle size={14}/> 削除済</span>}
                                </td>
                                <td className="p-4 text-center font-bold text-lg">{history.quantity}</td>
                                <td className="p-4 text-right">
                                  <div className="flex justify-end gap-2 opacity-100 sm:opacity-0 group-hover:opacity-100">
                                    <button onClick={() => openHistoryModal(history)} className="p-2 text-blue-600 bg-blue-50 rounded-lg"><Edit2 size={16} /></button>
                                    <button onClick={() => setDeleteConfirm({ isOpen: true, type: 'history', id: history.id })} className="p-2 text-red-600 bg-red-50 rounded-lg"><Trash2 size={16} /></button>
                                  </div>
                                </td>
                              </tr>
                            );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* モーダル類 (製品追加、履歴追加、削除確認、カメラ) */}
          {productModal.isOpen && (
            <div className="fixed inset-0 bg-gray-900/40 z-40 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl w-full max-w-md animate-zoom-in">
                <div className="p-4 border-b flex justify-between"><h3 className="font-bold">{productModal.isEditing ? '編集' : '登録'}</h3><button onClick={() => setProductModal({ isOpen: false, isEditing: false, data: null })}><X/></button></div>
                <form onSubmit={saveProduct} className="p-6 space-y-4">
                  <div><label className="text-sm font-bold block mb-1">商品名 *</label><input type="text" name="name" required defaultValue={productModal.data.name} className="w-full px-4 py-2 border rounded-lg" /></div>
                  <div className="grid grid-cols-2 gap-4">
                    <div><label className="text-sm font-bold block mb-1">カテゴリ</label><select name="category" defaultValue={productModal.data.category} className="w-full px-4 py-2 border rounded-lg">{CATEGORIES.map(c => <option key={c}>{c}</option>)}</select></div>
                    <div><label className="text-sm font-bold block mb-1">JANコード *</label><input type="text" name="janCode" required defaultValue={productModal.data.janCode} className="w-full px-4 py-2 border rounded-lg font-mono" /></div>
                  </div>
                  <div><label className="text-sm font-bold block mb-1">画像URL</label><input type="url" name="imageUrl" defaultValue={productModal.data.imageUrl} className="w-full px-4 py-2 border rounded-lg text-sm" /></div>
                  <div className="flex gap-3 pt-4"><button type="button" onClick={() => setProductModal({isOpen:false})} className="flex-1 py-2 bg-gray-100 rounded-lg">キャンセル</button><button type="submit" className="flex-1 py-2 bg-orange-600 text-white rounded-lg">保存</button></div>
                </form>
              </div>
            </div>
          )}

          {historyModal.isOpen && (
            <div className="fixed inset-0 bg-gray-900/40 z-40 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl w-full max-w-md animate-zoom-in">
                <div className="p-4 border-b flex justify-between"><h3 className="font-bold">{historyModal.isEditing ? '履歴編集' : '履歴追加'}</h3><button onClick={() => setHistoryModal({isOpen:false})}><X/></button></div>
                <div className="p-6 space-y-5">
                  <div className="bg-orange-50 p-4 rounded-xl border">
                    <label className="block text-sm font-bold mb-2">JAN検索</label>
                    <div className="flex gap-2">
                      <div className="relative flex-1"><Search className="absolute left-3 top-2 text-gray-400" size={18} /><input type="text" value={historyForm.janCode} onChange={(e) => handleJanCodeChange(e.target.value)} className="w-full pl-10 pr-4 py-2 border rounded-lg font-mono" placeholder="JAN..." /></div>
                      {!historyModal.isEditing && <button onClick={() => setIsScannerOpen(true)} className="bg-gray-800 text-white px-4 py-2 rounded-lg flex gap-2"><Camera size={18}/>カメラ</button>}
                    </div>
                    <div className="mt-3">
                      {historyForm.productId ? <div className="bg-white p-2 rounded border border-green-200 text-sm font-bold"><Check size={16} className="inline text-green-500 mr-2"/>{historyForm.productName}</div> : <div className="text-sm text-gray-400">商品が未登録または未入力</div>}
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div><label className="text-sm font-bold block mb-1">日付</label><input type="date" value={historyForm.date} onChange={(e) => setHistoryForm({...historyForm, date: e.target.value})} className="w-full px-3 py-2 border rounded-lg" /></div>
                    <div><label className="text-sm font-bold block mb-1">数量</label><input type="number" min="1" value={historyForm.quantity} onChange={(e) => setHistoryForm({...historyForm, quantity: Math.max(1, e.target.value)})} className="w-full px-3 py-2 border rounded-lg text-center" /></div>
                  </div>
                  <div className="pt-4 border-t flex gap-3">
                    {historyModal.isEditing ? (
                      <><select value={historyForm.type} onChange={e=>setHistoryForm({...historyForm, type: e.target.value})} className="flex-1 py-3 border rounded-xl"><option value="in">入庫</option><option value="out">出庫</option></select><button onClick={()=>saveHistory()} disabled={!historyForm.productId} className="flex-[2] bg-blue-600 text-white rounded-xl font-bold">更新保存</button></>
                    ) : (
                      <><button onClick={()=>saveHistory('in')} disabled={!historyForm.productId} className="flex-1 py-3 bg-green-100 text-green-700 font-bold rounded-xl border border-green-200 flex justify-center gap-1"><ArrowUpCircle size={18}/>入庫</button><button onClick={()=>saveHistory('out')} disabled={!historyForm.productId} className="flex-1 py-3 bg-orange-100 text-orange-700 font-bold rounded-xl border border-orange-200 flex justify-center gap-1"><ArrowDownCircle size={18}/>出庫</button></>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

          {deleteConfirm.isOpen && (
            <div className="fixed inset-0 bg-gray-900/50 z-50 flex items-center justify-center p-4">
               <div className="bg-white rounded-xl w-full max-w-sm p-6 text-center animate-zoom-in">
                 <AlertTriangle size={32} className="mx-auto text-red-500 mb-4" />
                 <h3 className="text-xl font-bold mb-4">削除しますか？</h3>
                 <div className="flex gap-3"><button onClick={() => setDeleteConfirm({isOpen: false})} className="flex-1 py-2 bg-gray-100 rounded-lg font-bold">キャンセル</button><button onClick={handleDelete} className="flex-1 py-2 bg-red-600 text-white rounded-lg font-bold">削除</button></div>
               </div>
            </div>
          )}

          {isScannerOpen && <BarcodeScanner onScan={handleScan} onClose={() => setIsScannerOpen(false)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
